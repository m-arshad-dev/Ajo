version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reliefnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/reliefnet
      JWT_SECRET: dev-secret
    ports:
      - "4000:4000"

  notification-worker:
    build: ./backend
    command: ["node", "src/workers/notificationWorker.js"]
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/reliefnet
      JWT_SECRET: dev-secret

volumes:
  pgdata:
